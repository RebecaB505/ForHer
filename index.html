<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños! CESIA 🎉</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #ffe6e6, #ffb3ba);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            max-width: 350px;
            width: 100%;
            z-index: 10;
            transform: scale(0.9);
            animation: buildUp 0.5s ease forwards;
        }
        h1 {
            color: #ff4d6d;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }
        p {
            color: #4a4a4a;
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }
        .btn {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            transition: transform 0.2s;
        }
        .btn:active {
            transform: scale(0.95);
        }
        /* Carta Oculta */
        .hidden-message {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed #ffb3ba;
            color: #590d22;
            font-style: italic;
            animation: fadeIn 1s ease;
        }
        /* Corazones flotantes */
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            pointer-events: none;
            animation: float Up 4s linear infinite;
            bottom: -50px;
        }
        @keyframes buildUp {
            to { transform: scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>¡Feliz Cumpleaños! Cesia🎂✨</h1>
        <p>Hoy es un día especial y quería prepararte un detalle un poco diferente, muy al estilo de lo que hago o disfruto hacer 😉</p>
        <button class="btn" onclick="revealMessage()">Presiona aquí</button>
        
        <div class="hidden-message" id="message">
            <p>Espero que pases un día increíble. Me encanta compartir tiempo contigo y quería recordarte lo especial que eres hoy. ¡Disfruta mucho tu día! 🎈</p>
        </div>
    </div>

    <script>
        function revealMessage() {
            // Mostrar mensaje
            const msg = document.getElementById('message');
            msg.style.display = 'block';
            
            // Lanzar lluvia de corazones de golpe al presionar
            for(let i = 0; i < 15; i++) {
                setTimeout(createHeart, i * 100);
            }
            
            // Mantener la lluvia constante
            setInterval(createHeart, 300);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's'; // Entre 3 y 5 seg
            heart.style.fontSize = (Math.random() * 15 + 15) + 'px'; // Tamaños variados
            document.body.appendChild(heart);

            // Eliminar del DOM tras terminar la animación
            setTimeout(() => {
                heart.remove();
            }, 5000);
        }
    </script>
</body>
</html>
